[app]

title = Jarvis

package.name = jarvis

package.domain = org.test

source.dir = .

source.include_exts = py,png,jpg,kv,atlas

version = 1.0

requirements = python3,kivy

orientation = portrait

fullscreen = 0

android.permissions = INTERNET

android.api = 33

android.minapi = 21

android.sdk = 33

android.ndk = 25b

android.build_tools_version = 33.0.2


[buildozer]

log_level = 2

warn_on_root = 1
